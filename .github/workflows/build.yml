name: Android APK Compiler

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Java Environment
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Generate Auto-Signing Debug Keystore
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Force Generate Gradle Wrapper
      run: gradle wrapper

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK to Web
      run: |
        APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
        curl -F reqtype=fileupload -F "fileToUpload=@$APK_PATH" https://catbox.moe/user/api.php
